name: "Update Flake Lock"

on:
  workflow_call:
    inputs:
      auto-merge:
        description: "Enable auto-merge on the PR"
        type: boolean
        required: true
      path-to-flake-dir:
        description: "Path to the flake directory"
        type: string
        required: false
      pr-title:
        description: "PR title"
        type: string
        required: false
      branch:
        description: "Branch name"
        type: string
        required: true
    secrets:
      GH_TOKEN:
        required: true

permissions:
  contents: write
  pull-requests: write

# Usage (from another repository):
#   permissions:
#     contents: write
#     pull-requests: write
#
#   jobs:
#     update-flake-lock:
#       uses: gawakawa/.github/.github/workflows/update-flake-lock.yml@main
#       with:
#         auto-merge: true  # required: true or false
#         path-to-flake-dir: "."  # optional: path to flake directory
#         pr-title: "⬆️ Update flake.lock"  # optional: PR title
#         branch: "update_flake_lock_action"  # optional: branch name
#       secrets:
#         GH_TOKEN: ${{ secrets.GH_TOKEN }}

jobs:
  update-flake-lock:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GH_TOKEN }}

      - name: Update flake.lock
        id: update
        uses: DeterminateSystems/update-flake-lock@main
        with:
          token: ${{ secrets.GH_TOKEN }}
          path-to-flake-dir: ${{ inputs.path-to-flake-dir }}
          pr-title: ${{ inputs.pr-title }}
          branch: ${{ inputs.branch }}

      - name: Enable auto-merge
        if: ${{ steps.update.outputs.pull-request-number && inputs.auto-merge == true }}
        run: gh pr merge --auto --merge ${{ steps.update.outputs.pull-request-number }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
