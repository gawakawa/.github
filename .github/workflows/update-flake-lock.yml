name: "Update Flake Lock"

on:
  workflow_call:
    inputs:
      auto-merge:
        description: "Enable auto-merge on the PR"
        type: boolean
        required: true
      path-to-flake-dir:
        description: "Path to the flake directory"
        type: string
        required: false
      pr-title:
        description: "PR title"
        type: string
        required: false
      branch:
        description: "Branch name"
        type: string
        required: true
    secrets:
      BOT_APP_ID:
        required: true
      BOT_PRIVATE_KEY:
        required: true

permissions:
  contents: write
  pull-requests: write

# Usage (from another repository):
#   Note: gawakawa-bot GitHub App must be installed on the caller repository
#
#   permissions:
#     contents: write
#     pull-requests: write
#
#   jobs:
#     update-flake-lock:
#       uses: gawakawa/.github/.github/workflows/update-flake-lock.yml@main
#       with:
#         auto-merge: true  # required: true or false
#         path-to-flake-dir: "."  # optional: path to flake directory
#         pr-title: "⬆️ Update flake.lock"  # optional: PR title
#         branch: "update_flake_lock_action"  # required: branch name
#       secrets:
#         BOT_APP_ID: ${{ secrets.BOT_APP_ID }}
#         BOT_PRIVATE_KEY: ${{ secrets.BOT_PRIVATE_KEY }}

jobs:
  update-flake-lock:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          github_access_token: ${{ steps.app-token.outputs.token }}

      - name: Update flake.lock
        id: update
        uses: DeterminateSystems/update-flake-lock@834c491b2ece4de0bbd00d85214bb5e83b4da5c6 # v28
        with:
          token: ${{ steps.app-token.outputs.token }}
          path-to-flake-dir: ${{ inputs.path-to-flake-dir }}
          pr-title: ${{ inputs.pr-title }}
          branch: ${{ inputs.branch }}

      - name: Enable auto-merge
        if: ${{ steps.update.outputs.pull-request-number && inputs.auto-merge == true }}
        run: gh pr merge --auto --merge "$PR_NUMBER"
        env:
          PR_NUMBER: ${{ steps.update.outputs.pull-request-number }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
