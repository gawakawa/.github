name: "Update Flake Lock"

on:
  workflow_call:
    inputs:
      auto-merge:
        description: "Enable auto-merge on the PR"
        type: boolean
        required: true
    secrets:
      GH_TOKEN:
        required: true
  workflow_dispatch: # Allow manual trigger
  schedule:
    - cron: "0 15 * * 5" # Run every Saturday at 00:00 JST (Friday 15:00 UTC)

permissions:
  contents: write
  pull-requests: write

# Usage (from another repository):
#   jobs:
#     update-flake-lock:
#       uses: gawakawa/.github/.github/workflows/update-flake-lock.yml@main
#       with:
#         auto-merge: true  # required: true or false
#       secrets:
#         GH_TOKEN: ${{ secrets.GH_TOKEN }}

jobs:
  update-flake-lock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GH_TOKEN }}

      - name: Update flake.lock
        id: update
        uses: DeterminateSystems/update-flake-lock@main
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Enable auto-merge
        if: ${{ steps.update.outputs.pull-request-number && (inputs.auto-merge == true || github.event_name != 'workflow_call') }}
        run: gh pr merge --auto --merge ${{ steps.update.outputs.pull-request-number }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
